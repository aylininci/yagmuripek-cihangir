<!DOCTYPE html>
<html lang="tr">
<head>
  <meta property="og:image" content="https://yagmurcihangir.com/gorsel.png">
<meta property="og:image:secure_url" content="https://yagmurcihangir.com/gorsel.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="1200">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://yagmurcihangir.com/gorsel.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Yağmur & Cihangir</title>
  <meta name="description" content="Yağmur İpek & Cihangir'in düğününe davetlisiniz. 14.08.2026, Mandalina Park, Güzelbahçe.">
  <meta name="author" content="Yağmur & Cihangir">
  <meta property="og:title" content="Yağmur & Cihangir - Düğün Davetiyesi">
  <meta property="og:description" content="Hikayemizin ilk sayfasına, kadeh kaldırmaya.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="tr_TR">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#3a0f1c">
  <link rel="canonical" href="./">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.85em%22 font-size=%2280%22>❤️</text></svg>">

  <!-- Google Fonts: Poppins (gövde), Playfair Display (saat/rakam), Oooh Baby (başlık/isim) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Playfair+Display:wght@500;600;700&family=Oooh+Baby&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================= AÇILIŞ KARTI (acilis.png, ~2sn) ================= -->
  <section id="opening" class="opening" aria-label="Açılış">
    <div class="opening__card" id="openingCard">
      <img class="opening__img" src="acilis.png" alt="Yağmur İpek ve Cihangir" decoding="async">
      <p class="opening__names">Yağmur İpek + Cihangir</p>
    </div>
  </section>

  <!-- ================= ZARF EKRANI (statik, mikro animasyon) ================= -->
  <section id="envelope-stage" class="envelope-stage" aria-label="Davetiye zarfı" hidden>
    <div class="atmosphere" aria-hidden="true">
      <canvas id="particles-canvas"></canvas>
    </div>

    <div class="envelope-wrap" id="envelopeWrap" role="button" tabindex="0" aria-label="Davetiyeyi açmak için tıklayın">
      <div class="envelope" id="envelope">
        <img class="envelope__img" src="zarf.png" alt="Düğün zarfı" draggable="false" decoding="async">
      </div>
      <span class="envelope__hint">TIKLA</span>
      <p class="envelope__caption">Hikayemizin ilk sayfasına,<br>kadeh kaldırmaya 🍾🥂</p>
    </div>
  </section>

  <!-- ================= ANA İÇERİK ================= -->
  <main id="invitation" class="invitation" hidden>

    <!-- Davetiye görseli -->
    <section class="section section--invitation reveal-scroll" aria-label="Davetiye">
      <div class="card card--invitation tilt" data-tilt>
        <img
          class="invitation-image"
          id="invitationImage"
          src="davetiye.jpg"
          alt="Yağmur ve Cihangir düğün davetiyesi — 14 Ağustos 2026, Mandalina Park, Güzelbahçe İzmir"
          loading="lazy"
          decoding="async"
        >
      </div>
    </section>

    <!-- Geri Sayım -->
    <section class="section section--countdown reveal-scroll" aria-label="Geri sayım">
      <h2 class="section-title">Geri Sayım</h2>
      <div class="countdown__grid">
        <div class="countdown__item">
          <div class="dial"><span class="dial__num" id="cd-days">00</span></div>
          <span class="countdown__label">Gün</span>
        </div>
        <div class="countdown__item">
          <div class="dial"><span class="dial__num" id="cd-hours">00</span></div>
          <span class="countdown__label">Saat</span>
        </div>
        <div class="countdown__item">
          <div class="dial"><span class="dial__num" id="cd-minutes">00</span></div>
          <span class="countdown__label">Dakika</span>
        </div>
        <div class="countdown__item">
          <div class="dial"><span class="dial__num" id="cd-seconds">00</span></div>
          <span class="countdown__label">Saniye</span>
        </div>
      </div>
    </section>

    <!-- Konum -->
    <section class="section section--location reveal-scroll" aria-label="Konum">
      <h2 class="section-title">Konum</h2>
      <div class="location__map">
        <div class="location__skeleton" id="mapSkeleton" aria-hidden="true"></div>
        <iframe
          id="mapFrame"
          title="Mandalina Park konumu"
          src="https://www.google.com/maps?q=Mandalina+Park+Guzelbahce+Izmir&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
      <a
        class="map-link"
        id="mapBtn"
        href="https://www.google.com/maps/dir/?api=1&destination=Mandalina+Park+Guzelbahce+Izmir"
        target="_blank"
        rel="noopener noreferrer"
      >Konuma Git</a>
    </section>

    <!-- Footer -->
    <footer class="section site-footer reveal-scroll">
      <div class="footer__polaroid">
        <img src="couple-polaroid.png" alt="Yağmur ve Cihangir" loading="lazy" decoding="async">
      </div>
      <p class="footer__message">Bu mutlu günümüzde sizleri aramızda görmekten onur duyarız.</p>
      <p class="footer__signature">Yağmur &amp; Cihangir</p>
    </footer>

  </main>

  <button class="music-toggle" id="musicToggle" type="button" aria-label="Müziği aç/kapat">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/>
      <circle cx="18" cy="16" r="3"/>
    </svg>
  </button>

  <audio id="bgMusic" loop preload="auto">
    <source src="muzik.mp3" type="audio/mpeg">
    <source src="Pachelbel - Canon in D Major (Original Version).mp3" type="audio/mpeg">
  </audio>

  <canvas id="petalsCanvas" class="petals-canvas" aria-hidden="true"></canvas>
  <canvas id="confettiCanvas" class="confetti-canvas" aria-hidden="true"></canvas>

  <!-- GSAP (yedek CDN ile) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    window.gsap || document.write('<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"><\/script>');
  </script>
  <script src="script.js"></script>
</body>
</html>
